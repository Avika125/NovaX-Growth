 true topic gaps (areas competitors cover but the target domain does not), and return a prioritized list of topics with metrics and a short rationale.\n\nQuick defaults\n\nmin_keywords_per_topic = 2\n\nmax_topics = 25\n\nmin_aggregate_volume = 200 (optional filter)\n\nreturn_csv = false\n\nProcedure\n\nValidate input. If keywords missing/empty, return a clear error object.\n\nNormalize keywords. Lowercase, trim, remove punctuation; keep original values in output.\n\nCluster keywords into topics.\n\nUse semantic clustering if available; otherwise use token overlap, shared stems and modifier patterns (how to, vs, pricing, faq, etc.).\n\nRequire ≥ min_keywords_per_topic to form a topic; merge very small clusters into nearest topic.\n\nCompute topic metrics:\n\nkeywords_count, aggregate_volume (sum), avg_kd, avg_competitor_position, num_competitors_covering, serp_features_count (if available), and target_coverage (none|weak|present).\n\nClassify gaps:\n\nMark as gap when competitors show clear coverage (single strong ranking or multiple competitors) and the target lacks coverage or ranks poorly across the topic.\n\nMark weak_coverage if the target has pages but they are low-ranking/not comprehensive.\n\nInfer high-level intent &amp; content type: label the topic with primary intent (informational/transactional/commercial) and a high-level content_type (pillar/guide/faq/comparison/product/listicle/quick-answer). Do not produce briefs.\n\nRecommend next-step action (brief-level only): one short field suggested_action such as create new, expand existing, add FAQ, or merge into pillar. Do not include brief details.\n\nScore &amp; prioritize: compute an explainable priority_score using aggregate volume, 1/avg_kd, num_competitors_covering, target_coverage (penalize present coverage), and SERP features. Sort descending.\n\nEstimate effort &amp; confidence: provide estimated_effort (low|medium|high) and confidence (high|medium|low) based on evidence and clustering quality.\n\nReturn output in the following JSON structure:\n{\n  \&quot;metadata\&quot;: {\n    \&quot;domain\&quot;: \&quot;...\&quot;,\n    \&quot;competitors\&quot;: [...],\n    \&quot;filters_used\&quot;: {...},\n    \&quot;total_gap_keywords\&quot;: 0,\n    \&quot;topics_returned\&quot;: 0,\n    \&quot;timestamp\&quot;: \&quot;ISO\&quot;\n  },\n  \&quot;topics\&quot;: [\n    {\n      \&quot;topic_id\&quot;: \&quot;t1\&quot;,\n      \&quot;topic_label\&quot;: \&quot;short phrase\&quot;,\n      \&quot;representative_keyword\&quot;: \&quot;string\&quot;,\n      \&quot;keywords\&quot;: [\n        {\&quot;keyword\&quot;:\&quot;...\&quot;,\&quot;search_volume\&quot;:int,\&quot;keyword_difficulty\&quot;:float,\&quot;best_competitor\&quot;:\&quot;...\&quot;,\&quot;best_competitor_position\&quot;:int,\&quot;best_competitor_url\&quot;:\&quot;...\&quot;}\n      ],\n      \&quot;keywords_count\&quot;: int,\n      \&quot;aggregate_volume\&quot;: int,\n      \&quot;avg_kd\&quot;: float,\n      \&quot;num_competitors_covering\&quot;: int,\n      \&quot;avg_competitor_position\&quot;: float,\n      \&quot;serp_features_count\&quot;: int,\n      \&quot;target_coverage\&quot;: \&quot;none|weak|present\&quot;,\n      \&quot;intent\&quot;: \&quot;informational|transactional|commercial\&quot;,\n      \&quot;content_type\&quot;: \&quot;pillar|guide|faq|comparison|product|listicle|quick-answer\&quot;,\n      \&quot;suggested_action\&quot;: \&quot;create new|expand existing|add FAQ|merge into pillar\&quot;,\n      \&quot;estimated_effort\&quot;: \&quot;low|medium|high\&quot;,\n      \&quot;priority_score\&quot;: float,\n      \&quot;confidence\&quot;: \&quot;high|medium|low\&quot;,\n      \&quot;example_competitor_urls\&quot;: [\&quot;...\&quot;],\n      \&quot;notes\&quot;: \&quot;short text explaining why this is a gap\&quot;\n    }\n  ]\n}\n&quot;}},&quot;id&quot;:&quot;5e6b7e5a-4c67-4d1d-b67f-a44763ceaa96&quot;,&quot;name&quot;:&quot;Analyze Keyword Gaps&quot;,&quot;type&quot;:&quot;@n8n/n8n-n
